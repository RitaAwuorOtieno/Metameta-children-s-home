<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard | Metameta</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<header class="navbar">
  <div class="nav-container">

    <div class="logo">
      <img src="images/metameta-logo.png">
      <span>Admin Panel</span>
    </div>

    <button class="donate" onclick="logoutUser()">Logout</button>

  </div>
</header>

<!-- ================= DASHBOARD ================= -->
<section class="container" style="margin-top:40px;">

  <h1 style="text-align:center;">Admin Dashboard</h1>

  <!-- ================= ADD EVENT ================= -->
  <div class="card" style="margin-top:30px;">
    <h2>Add New Event</h2>

    <input type="text" id="event-title" placeholder="Event Title" style="width:100%; margin:10px 0;">
    <textarea id="event-desc" placeholder="Event Description" style="width:100%; margin:10px 0;"></textarea>
    <input type="date" id="event-date" style="width:100%; margin:10px 0;">
    <input type="text" id="event-image" placeholder="Image URL (paste link here)" style="width:100%; margin:10px 0;">

    <button class="btn" onclick="addEvent()">Add Event</button>
  </div>

  <!-- ================= EVENTS LIST ================= -->
  <div class="card" style="margin-top:30px;">
    <h2>All Events</h2>

    <div id="event-list"></div>
  </div>

  <!-- ================= MESSAGES ================= -->
  <div class="card" style="margin-top:30px;">
    <h2>Messages from Users</h2>

    <div id="messages-list"></div>
  </div>

  <!-- ================= DONATIONS ================= -->
  <div class="card" style="margin-top:30px;">
    <h2>Donations</h2>

    <div id="donations-list"></div>
  </div>

</section>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
